# checkov v3.x renamed --skip_check (underscore) to --skip-check (dash).
# When checkov re-applies skip_check from a config file it reconstructs the old
# --skip_check form, which the new parser rejects as unrecognized. The skip list
# is therefore passed directly via --skip-check in .github/workflows/tflint-and-checkov.yml.
framework:
  - terraform

directory:
  - terraform/

compact: true
quiet: false
