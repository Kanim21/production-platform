# Helm values for kube-prometheus-stack
# https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
#
# Deploy with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f kubernetes/monitoring/values.yaml

nameOverride: ""
fullnameOverride: ""

# ── Global ────────────────────────────────────────────────────────────────────

global:
  evaluation_interval: 30s
  scrape_interval: 30s

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false         # EKS managed — no etcd access
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false  # Managed — not scrappable
    kubelet: true
    kubeProxy: false              # Managed
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: false  # Managed
    kubeSchedulerRecording: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# ── Alertmanager ──────────────────────────────────────────────────────────────

alertmanager:
  enabled: true

  alertmanagerSpec:
    nodeSelector:
      node.kubernetes.io/role: worker

    replicas: 2

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ["alertname", "cluster", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: slack-default
      routes:
        - match:
            severity: critical
          receiver: pagerduty-p1
          continue: true
        - match:
            severity: critical
          receiver: slack-oncall
        - match:
            severity: warning
          receiver: slack-default

    receivers:
      - name: slack-default
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url
            channel: "#platform-alerts"
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Description:* {{ .Annotations.description }}
                *Severity:* {{ .Labels.severity }}
                *Namespace:* {{ .Labels.namespace }}
              {{ end }}

      - name: slack-oncall
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook-url
            channel: "#platform-oncall"
            title: 'P1 ALERT: {{ .CommonLabels.alertname }}'

      - name: pagerduty-p1
        pagerduty_configs:
          - service_key_file: /etc/alertmanager/secrets/pagerduty-service-key
            description: '{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}'
            severity: critical

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ["alertname", "namespace"]

# ── Grafana ───────────────────────────────────────────────────────────────────

grafana:
  enabled: true

  nodeSelector:
    node.kubernetes.io/role: worker

  adminPassword: ""  # Set via --set grafana.adminPassword or a Kubernetes secret

  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      # Pre-built dashboards from grafana.com
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6336
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus

  grafana.ini:
    server:
      root_url: https://grafana.production-platform.example.com
    auth:
      disable_login_form: false
    security:
      allow_embedding: false
      cookie_secure: true

  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
    hosts:
      - grafana.production-platform.example.com
    tls: []

# ── Prometheus ────────────────────────────────────────────────────────────────

prometheus:
  enabled: true

  prometheusSpec:
    nodeSelector:
      node.kubernetes.io/role: worker

    retention: 30d
    retentionSize: 45GB

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Scrape all ServiceMonitors and PodMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    additionalScrapeConfigs:
      - job_name: "aurora-cloudwatch-exporter"
        static_configs:
          - targets: ["cloudwatch-exporter:9106"]
        scrape_interval: 60s

    # Application-specific alerting rules
    additionalPrometheusRulesMap:
      production-platform:
        groups:
          - name: api.rules
            interval: 30s
            rules:
              - alert: APIHighErrorRate
                expr: |
                  sum(rate(http_requests_total{status=~"5..",namespace="app"}[5m]))
                  /
                  sum(rate(http_requests_total{namespace="app"}[5m])) > 0.01
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "API error rate above 1%"
                  description: "API is returning {{ $value | humanizePercentage }} errors"

              - alert: APIHighErrorRateCritical
                expr: |
                  sum(rate(http_requests_total{status=~"5..",namespace="app"}[5m]))
                  /
                  sum(rate(http_requests_total{namespace="app"}[5m])) > 0.05
                for: 2m
                labels:
                  severity: critical
                annotations:
                  summary: "API error rate above 5% — P1"
                  description: "API is returning {{ $value | humanizePercentage }} errors. Immediate action required."

              - alert: APIHighLatency
                expr: |
                  histogram_quantile(0.99,
                    sum(rate(http_request_duration_seconds_bucket{namespace="app"}[5m])) by (le)
                  ) > 0.5
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "API p99 latency above 500ms"
                  description: "p99 latency is {{ $value | humanizeDuration }}"

              - alert: APIDown
                expr: |
                  sum(up{job="api", namespace="app"}) == 0
                for: 1m
                labels:
                  severity: critical
                annotations:
                  summary: "All API pods are down"
                  description: "No API pods are healthy. Checkout is unavailable."

          - name: database.rules
            rules:
              - alert: DBQuerySlow
                expr: |
                  histogram_quantile(0.99,
                    sum(rate(db_query_duration_seconds_bucket{namespace="app"}[5m])) by (le, operation)
                  ) > 0.5
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "Database query p99 above 500ms for {{ $labels.operation }}"

# ── Node Exporter ─────────────────────────────────────────────────────────────

nodeExporter:
  enabled: true

# ── Kube State Metrics ────────────────────────────────────────────────────────

kubeStateMetrics:
  enabled: true

# ── Prometheus Operator ───────────────────────────────────────────────────────

prometheusOperator:
  nodeSelector:
    node.kubernetes.io/role: system
  tolerations:
    - key: "node.kubernetes.io/role"
      value: "system"
      effect: "NoSchedule"

# ── StorageClass ──────────────────────────────────────────────────────────────
# EKS requires the EBS CSI driver addon and a gp3 StorageClass.
# Apply this before deploying the stack:
#
#   kubectl apply -f - <<EOF
#   apiVersion: storage.k8s.io/v1
#   kind: StorageClass
#   metadata:
#     name: gp3
#     annotations:
#       storageclass.kubernetes.io/is-default-class: "true"
#   provisioner: ebs.csi.aws.com
#   volumeBindingMode: WaitForFirstConsumer
#   allowVolumeExpansion: true
#   parameters:
#     type: gp3
#     encrypted: "true"
#   EOF
