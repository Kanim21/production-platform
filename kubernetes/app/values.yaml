# Helm values for the production-platform application
# Override per-environment with: helm upgrade -f values-prod.yaml

nameOverride: ""
fullnameOverride: ""

image:
  registry: ""  # Set to ECR registry, e.g. 012345678901.dkr.ecr.us-east-1.amazonaws.com
  tag: latest   # CI sets this to the git SHA

api:
  replicaCount: 2

  image:
    repository: production-platform/api

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"

  serviceAccount:
    create: true
    name: api-sa
    annotations:
      eks.amazonaws.com/role-arn: ""  # Set to IRSA role ARN via environment override

  env:
    - name: DB_SECRET_ARN
      valueFrom:
        secretKeyRef:
          name: db-secret-arn
          key: arn
    - name: LOG_LEVEL
      value: info

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health/ready
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 20
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Pods
            value: 1
            periodSeconds: 60

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: api
          topologyKey: kubernetes.io/hostname

  nodeSelector:
    node.kubernetes.io/role: api

  tolerations: []

  service:
    type: ClusterIP
    port: 8080

  ingress:
    enabled: true
    className: alb
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/healthcheck-path: /health
      alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
      alb.ingress.kubernetes.io/healthy-threshold-count: "2"
      alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
      alb.ingress.kubernetes.io/load-balancer-attributes: "idle_timeout.timeout_seconds=60"
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
    hosts:
      - host: api.production-platform.example.com
        paths:
          - path: /api/
            pathType: Prefix
    tls: []

web:
  replicaCount: 2

  image:
    repository: production-platform/web

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  livenessProbe:
    httpGet:
      path: /health
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /health
      port: 80
    initialDelaySeconds: 3
    periodSeconds: 5

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  nodeSelector:
    node.kubernetes.io/role: worker

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: true
    className: alb
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
    hosts:
      - host: production-platform.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

networkPolicy:
  enabled: true
  # API pods can only receive from ALB and talk to DB/Redis
  apiIngress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
  apiEgress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 443
          protocol: TCP
