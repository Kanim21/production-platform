name: App Build & Push

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "kubernetes/app/**"
      - ".github/workflows/app-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-api:
    name: Build Go API
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/api/go.mod
          cache-dependency-path: app/api/go.sum

      - name: Run tests
        working-directory: app/api
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: app/api/coverage.out

      - name: Configure AWS credentials via OIDC
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: ecr-push-api-${{ github.run_id }}

      - name: Login to ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_tag=${{ env.ECR_REGISTRY }}/production-platform/api:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_latest=${{ env.ECR_REGISTRY }}/production-platform/api:latest" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: app/api
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_latest }}
          build-args: |
            VERSION=${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  build-web:
    name: Build React Web
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/web/package-lock.json

      - name: Install dependencies
        working-directory: app/web
        run: npm ci

      - name: Lint
        working-directory: app/web
        run: npm run lint

      - name: Build
        working-directory: app/web
        run: npm run build

      - name: Configure AWS credentials via OIDC
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: ecr-push-web-${{ github.run_id }}

      - name: Login to ECR
        if: github.event_name == 'push'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image_tag=${{ env.ECR_REGISTRY }}/production-platform/web:$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_latest=${{ env.ECR_REGISTRY }}/production-platform/web:latest" >> $GITHUB_OUTPUT

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: app/web
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_latest }}
          build-args: |
            VITE_ENV=prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-24.04
    needs: [build-api, build-web]
    if: github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-eks-staging
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: helm-deploy-staging-${{ github.run_id }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Update kubeconfig for staging
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name production-platform-staging

      - name: Deploy to staging
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          helm upgrade --install production-platform-app ./kubernetes/app \
            --namespace app \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set image.registry=${{ env.ECR_REGISTRY }} \
            --set image.tag=$SHORT_SHA \
            --set api.serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ vars.API_IRSA_ROLE_ARN_STAGING }}

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/production-platform-app-api \
            -n app --timeout=5m
