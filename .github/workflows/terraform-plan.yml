name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  id-token: write    # Required for OIDC
  contents: read
  pull-requests: write  # Required to post plan as PR comment

env:
  TF_VERSION: "1.9.5"
  AWS_REGION: "us-east-1"

jobs:
  changed-environments:
    name: Detect changed environments
    runs-on: ubuntu-24.04
    outputs:
      environments: ${{ steps.detect.outputs.environments }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect which environments changed
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep '^terraform/' | \
            sed 's|terraform/environments/\([^/]*\)/.*|\1|' | sort -u | \
            grep -E '^(dev|staging|prod)$' || echo "")

          # Always plan all environments if modules changed
          if git diff --name-only origin/main...HEAD | grep -q '^terraform/modules/'; then
            CHANGED="dev staging prod"
          fi

          # Format as JSON array for matrix
          MATRIX=$(echo "$CHANGED" | tr ' ' '\n' | grep -v '^$' | jq -Rc '[.,inputs]' | head -1)
          if [ -z "$CHANGED" ]; then
            MATRIX='["dev","staging","prod"]'
          fi
          echo "environments=$MATRIX" >> $GITHUB_OUTPUT

  plan:
    name: Plan ${{ matrix.environment }}
    runs-on: ubuntu-24.04
    needs: changed-environments
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.changed-environments.outputs.environments) }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-terraform-${{ matrix.environment }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: terraform-plan-${{ matrix.environment }}-${{ github.run_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -no-color

      - name: Terraform Validate
        id: validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform plan \
            -no-color \
            -input=false \
            -out=tfplan \
            -var="pagerduty_sns_endpoint=${{ secrets.PAGERDUTY_SNS_ENDPOINT }}" \
            -var="slack_sns_endpoint=${{ secrets.SLACK_SNS_ENDPOINT }}" \
            2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync(
              'terraform/environments/${{ matrix.environment }}/plan_output.txt',
              'utf8'
            );

            const maxLength = 65000;
            const truncated = planOutput.length > maxLength
              ? planOutput.slice(0, maxLength) + '\n\n...[truncated]'
              : planOutput;

            const outcome = '${{ steps.plan.outcome }}';
            const statusIcon = outcome === 'success' ? '✅' : '❌';

            const body = `## Terraform Plan — \`${{ matrix.environment }}\` ${statusIcon}

            **Workflow:** [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Commit:** \`${{ github.sha }}\`

            <details>
            <summary>Show Plan Output</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>`;

            // Update existing comment if present, otherwise create
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.data.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(`Terraform Plan — \`${{ matrix.environment }}\``)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
