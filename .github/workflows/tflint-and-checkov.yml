name: Terraform Lint & Security Scan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/tflint-and-checkov.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".checkov.yaml"
      - ".github/workflows/tflint-and-checkov.yml"

permissions:
  contents: read
  security-events: write  # For SARIF upload to GitHub Security tab
  pull-requests: write

jobs:
  tflint:
    name: TFLint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.52.0

      - name: Initialize TFLint (install AWS ruleset)
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint on modules
        run: |
          FAILED=0
          for dir in terraform/modules/*/; do
            echo "==> Linting $dir"
            if ! tflint --chdir="$dir" --format=compact; then
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Run TFLint on environments
        run: |
          FAILED=0
          for dir in terraform/environments/*/; do
            echo "==> Linting $dir"
            if ! tflint --chdir="$dir" --format=compact; then
              FAILED=1
            fi
          done
          exit $FAILED

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        # directory/framework/compact come from .checkov.yaml.
        # skip-check is passed on the CLI because checkov v3.x config-file re-applies
        # skip_check as the old --skip_check flag, which its own parser now rejects.
        # Rationale for each skip is documented in .checkov.yaml.
        run: |
          checkov --output sarif --output-file-path checkov-results.sarif \
            --skip-check \
              CKV_AWS_149,CKV2_AWS_62,CKV2_AWS_11,\
              CKV_AWS_41,CKV_AWS_60,CKV_AWS_274,CKV_AWS_61,\
              CKV_AWS_290,CKV_AWS_63,CKV_AWS_288,CKV_AWS_287,CKV_AWS_286,CKV_AWS_355,\
              CKV_AWS_339,CKV_AWS_58,CKV_AWS_341,CKV_AWS_79,\
              CKV_AWS_88,CKV_AWS_46,CKV_AWS_100,CKV2_AWS_5,\
              CKV_AWS_33,CKV_AWS_7,CKV_AWS_227,CKV2_AWS_64,\
              CKV_AWS_66,CKV_AWS_158,\
              CKV_AWS_260,CKV_AWS_277,CKV_AWS_24,CKV_AWS_25,\
              CKV2_AWS_57,CKV2_AWS_8,CKV2_AWS_27

      - name: Upload Checkov SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  infracost:
    name: Infracost (cost estimate)
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate baseline cost (main branch)
        run: |
          git checkout origin/main
          infracost breakdown \
            --path=terraform/environments/prod \
            --format=json \
            --out-file=/tmp/infracost-baseline.json \
            --terraform-var="pagerduty_sns_endpoint=placeholder" \
            --terraform-var="slack_sns_endpoint=placeholder" \
            --terraform-var='allowed_cidr_blocks=["0.0.0.0/0"]'

      - name: Generate PR cost diff
        run: |
          git checkout ${{ github.head_ref }}
          infracost diff \
            --path=terraform/environments/prod \
            --format=json \
            --compare-to=/tmp/infracost-baseline.json \
            --out-file=/tmp/infracost-diff.json \
            --terraform-var="pagerduty_sns_endpoint=placeholder" \
            --terraform-var="slack_sns_endpoint=placeholder" \
            --terraform-var='allowed_cidr_blocks=["0.0.0.0/0"]'

      - name: Post cost diff as PR comment
        run: |
          infracost comment github \
            --path=/tmp/infracost-diff.json \
            --repo=${{ github.repository }} \
            --pull-request=${{ github.event.pull_request.number }} \
            --github-token=${{ secrets.GITHUB_TOKEN }} \
            --behavior=update

  validate-modules:
    name: Terraform Validate
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Validate all environments
        run: |
          FAILED=0
          for dir in terraform/environments/*/; do
            echo "==> Validating $dir"
            pushd "$dir" > /dev/null
            # Init with a dummy backend to skip S3 (no AWS creds needed for validate)
            if ! terraform init -backend=false -no-color > /dev/null 2>&1; then
              echo "  INIT FAILED"
              FAILED=1
              popd > /dev/null
              continue
            fi
            if ! terraform validate -no-color; then
              FAILED=1
            fi
            popd > /dev/null
          done
          exit $FAILED
