name: Terraform Lint & Security Scan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/tflint-and-checkov.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".checkov.yaml"
      - ".github/workflows/tflint-and-checkov.yml"

permissions:
  contents: read
  security-events: write  # For SARIF upload to GitHub Security tab
  pull-requests: write

jobs:
  tflint:
    name: TFLint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.52.0

      - name: Initialize TFLint (install AWS ruleset)
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint on modules
        run: |
          FAILED=0
          for dir in terraform/modules/*/; do
            echo "==> Linting $dir"
            if ! tflint --chdir="$dir" --format=compact; then
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Run TFLint on environments
        run: |
          FAILED=0
          for dir in terraform/environments/*/; do
            echo "==> Linting $dir"
            if ! tflint --chdir="$dir" --format=compact; then
              FAILED=1
            fi
          done
          exit $FAILED

  checkov:
    name: Checkov Security Scan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Run Checkov
        # directory/framework/compact come from .checkov.yaml.
        # --skip-check is passed on the CLI because checkov v3.x re-applies config-file
        # skip_check entries as the old --skip_check flag (underscore), which its own
        # parser now rejects. Full rationale per check is in docs/adr/005-*.md.
        # Checks fall into four categories:
        #   1. False positives — checkov can't statically resolve Terraform variables/modules
        #   2. By-design for reference architecture (no live AWS, manual apply)
        #   3. Cost trade-offs acceptable for dev/portfolio (no RDS Performance Insights CMK, etc.)
        #   4. Checks superseded by other controls already in the code (OIDC auth, IMDSv2, etc.)
        env:
          SKIP: >-
            CKV_AWS_149,CKV2_AWS_62,CKV2_AWS_11,CKV_AWS_41,CKV_AWS_60,CKV_AWS_274,
            CKV_AWS_61,CKV_AWS_290,CKV_AWS_63,CKV_AWS_288,CKV_AWS_287,CKV_AWS_286,
            CKV_AWS_355,CKV_AWS_339,CKV_AWS_58,CKV_AWS_341,CKV_AWS_79,CKV_AWS_88,
            CKV_AWS_46,CKV_AWS_100,CKV2_AWS_5,CKV_AWS_33,CKV_AWS_7,CKV_AWS_227,
            CKV2_AWS_64,CKV_AWS_66,CKV_AWS_158,CKV_AWS_260,CKV_AWS_277,CKV_AWS_24,
            CKV_AWS_25,CKV2_AWS_57,CKV2_AWS_8,CKV2_AWS_27,
            CKV2_AWS_12,CKV2_AWS_19,CKV2_AWS_35,CKV2_AWS_40,CKV2_AWS_44,CKV2_AWS_56,
            CKV_AWS_118,CKV_AWS_130,CKV_AWS_133,CKV_AWS_139,CKV_AWS_162,CKV_AWS_17,
            CKV_AWS_226,CKV_AWS_23,CKV_AWS_250,CKV_AWS_26,CKV_AWS_289,CKV_AWS_313,
            CKV_AWS_319,CKV_AWS_324,CKV_AWS_327,CKV_AWS_338,CKV_AWS_353,CKV_AWS_354,
            CKV_AWS_37,CKV_AWS_38,CKV_AWS_382,CKV_AWS_39,CKV_AWS_62,CKV_AWS_96
        run: |
          SKIP_CLEAN=$(echo "$SKIP" | tr -d ' \n')
          checkov --output sarif --output-file-path checkov-results.sarif \
            --skip-check "$SKIP_CLEAN"

      - name: Upload Checkov SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  validate-modules:
    name: Terraform Validate
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: Validate all environments
        run: |
          FAILED=0
          for dir in terraform/environments/*/; do
            echo "==> Validating $dir"
            pushd "$dir" > /dev/null
            # Init with a dummy backend to skip S3 (no AWS creds needed for validate)
            if ! terraform init -backend=false -no-color > /dev/null 2>&1; then
              echo "  INIT FAILED"
              FAILED=1
              popd > /dev/null
              continue
            fi
            if ! terraform validate -no-color; then
              FAILED=1
            fi
            popd > /dev/null
          done
          exit $FAILED
